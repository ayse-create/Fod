<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>🐱 Kedi'nin Macerası</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <!-- Oyun Konteynırı -->
    <div id="game-container">

        <!-- SAHNE 1: SOKAK (3 ŞERİT) -->
        <div id="scene-sokak" class="scene active">
            <div class="road">
                <div class="lane lane-left"></div>
                <div class="lane lane-center"></div>
                <div class="lane lane-right"></div>
            </div>
            <div id="cat-sokak" class="cat">🐱</div>
            <div id="score-sokak" class="score">🏆 0</div>
            <div id="hint-sokak" class="hint">⬅️ ➡️ Kaydır / Oklar ile şerit değiştir · ⬆️ Zıpla</div>
        </div>

        <!-- SAHNE 2: ORMAN (YÜRÜYÜŞ) -->
        <div id="scene-orman" class="scene">
            <div class="forest-bg"></div>
            <div id="cat-orman" class="cat">🐱</div>
            <div id="story-orman" class="story-text">Kedi seni ormanda takip etmeye çağırıyor...</div>
            <button id="btn-orman" class="action-btn">🐾 Takip Et</button>
        </div>

        <!-- SAHNE 3: ARABA (ÜSTTEN GÖRÜNÜM) -->
        <div id="scene-araba" class="scene">
            <div class="road-topdown"></div>
            <div id="car" class="car">🚗</div>
            <div id="hole" class="hole">🕳️</div>
            <div id="car-hint" class="hint">⬆️ İleri · ⬇️ Geri · ⬅️➡️ Direksiyon</div>
        </div>

        <!-- SAHNE 4: YERALTI (KÖSTEBEK) -->
        <div id="scene-yeralti" class="scene">
            <div class="underground-bg"></div>
            <div id="moles-container"></div>
            <div id="mole-score" class="score">🔨 0 / 8</div>
            <div id="mole-hint" class="hint">👆 Köstebeklere vur!</div>
        </div>

        <!-- SAHNE 5: UZAY (METEOR) -->
        <div id="scene-uzay" class="scene">
            <div class="space-bg"></div>
            <div id="ship" class="ship">🚀</div>
            <div id="space-score" class="score">💫 0</div>
        </div>

        <!-- SAHNE 6: UZAYLI SAVAŞI -->
        <div id="scene-uzayli" class="scene">
            <div class="space-bg"></div>
            <div id="ship-uzayli" class="ship">🚀</div>
            <div id="aliens-container"></div>
            <div id="alien-score" class="score">👾 0</div>
            <div id="alien-hint" class="hint">🎯 Uzaylılara tıkla / Space ile ateş et!</div>
        </div>

        <!-- SAHNE 7: RETRO PİXEL -->
        <div id="scene-retro" class="scene">
            <div class="retro-bg"></div>
            <div id="retro-cat" class="retro-cat">🐱</div>
            <div id="retro-platforms"></div>
            <div id="retro-hint" class="hint">⬅️ ➡️ Hareket · ⬆️ Zıpla</div>
        </div>

        <!-- SAHNE 8: LABORATUVAR -->
        <div id="scene-lab" class="scene">
            <div class="lab-bg"></div>
            <div id="lab-text" class="lab-text">🧪 TO BE CONTINUED...</div>
        </div>

    </div>

    <script src="main.js"></script>
</body>
</html>
